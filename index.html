<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة عملاء الشركة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .form-card, .list-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 30px;
        }

        .form-card h2, .list-card h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 22px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.2);
        }

        input.required::placeholder {
            color: #ccc;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-10px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .client-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-right: 4px solid #667eea;
            animation: slideIn 0.3s ease-out;
        }

        .client-item h4 {
            color: #333;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .client-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
        }

        .client-info span {
            display: flex;
            flex-direction: column;
        }

        .client-info strong {
            color: #333;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .client-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            margin: 0;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-small:hover {
            background: #764ba2;
        }

        .btn-delete {
            background: #e74c3c;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        .stats {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .stats p {
            color: #555;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .stats strong {
            color: #667eea;
            font-size: 18px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }
        }

        .gender-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
        }

        .gender-male {
            background: #cce5ff;
            color: #0066cc;
        }

        .gender-female {
            background: #ffd1d1;
            color: #cc0000;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .loading::after {
            content: '.';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
        }

        .search-box button {
            flex: 0 0 auto;
            width: auto;
            padding: 12px 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 إدارة عملاء الشركة</h1>
        <p>نظام متقدم لإدارة بيانات العملاء بأمان وسهولة</p>
    </div>

    <div class="container">
        <div class="content">
            <!-- نموذج إضافة عميل جديد -->
            <div class="form-card">
                <h2>➕ إضافة عميل جديد</h2>

                <div id="formMessage" class="message"></div>

                <form id="clientForm" onsubmit="addClient(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">الاسم الأول *</label>
                            <input 
                                type="text" 
                                id="firstName" 
                                placeholder="مثال: أحمد"
                                required
                            >
                        </div>
                        <div class="form-group">
                            <label for="lastName">الاسم الأخير *</label>
                            <input 
                                type="text" 
                                id="lastName" 
                                placeholder="مثال: محمد"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="location">المكان *</label>
                        <input 
                            type="text" 
                            id="location" 
                            placeholder="مثال: القاهرة - مصر الجديدة"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="phone">رقم الهاتف *</label>
                        <input 
                            type="tel" 
                            id="phone" 
                            placeholder="مثال: 01001234567"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="gender">النوع (اختياري)</label>
                        <select id="gender">
                            <option value="">اختر...</option>
                            <option value="ذكر">ذكر 👨</option>
                            <option value="أنثى">أنثى 👩</option>
                        </select>
                    </div>

                    <button type="submit">حفظ البيانات ✅</button>
                </form>
            </div>

            <!-- قائمة العملاء -->
            <div class="list-card">
                <h2>👥 قائمة العملاء</h2>

                <div class="stats">
                    <p>إجمالي العملاء: <strong id="totalClients">0</strong></p>
                    <p>ذكور: <strong id="maleCount">0</strong> | إناث: <strong id="femaleCount">0</strong></p>
                </div>

                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="ابحث عن اسم أو رقم هاتف..."
                        onkeyup="filterClients()"
                    >
                </div>

                <div id="clientsList" class="loading">جاري تحميل البيانات...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let allClients = [];

        // ✅ إضافة عميل جديد
        async function addClient(e) {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const location = document.getElementById('location').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const gender = document.getElementById('gender').value || null;

            const messageEl = document.getElementById('formMessage');
            messageEl.className = 'message';

            try {
                const response = await fetch(`${API_URL}/clients`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        first_name: firstName,
                        last_name: lastName,
                        location,
                        phone,
                        gender
                    })
                });

                const data = await response.json();

                if (data.success) {
                    messageEl.textContent = '✅ ' + data.message;
                    messageEl.classList.add('success');
                    document.getElementById('clientForm').reset();
                    loadClients();
                    
                    setTimeout(() => {
                        messageEl.classList.remove('success');
                    }, 5000);
                } else {
                    messageEl.textContent = '❌ ' + data.message;
                    messageEl.classList.add('error');
                }
            } catch (error) {
                messageEl.textContent = '❌ خطأ في الاتصال بالخادم';
                messageEl.classList.add('error');
                console.error('Error:', error);
            }
        }

        // ✅ تحميل جميع العملاء
        async function loadClients() {
            try {
                const response = await fetch(`${API_URL}/clients`);
                const data = await response.json();

                if (data.success) {
                    allClients = data.data || [];
                    displayClients(allClients);
                    updateStats();
                }
            } catch (error) {
                document.getElementById('clientsList').innerHTML = `
                    <div class="empty-state">
                        <p>❌ خطأ في الاتصال بالخادم</p>
                        <p style="font-size: 12px; margin-top: 10px;">تأكد من تشغيل الخادم: node server.js</p>
                    </div>
                `;
                console.error('Error:', error);
            }
        }

        // ✅ عرض العملاء
        function displayClients(clients) {
            const listEl = document.getElementById('clientsList');

            if (clients.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <p>📭 لا توجد بيانات عملاء حتى الآن</p>
                        <p style="font-size: 12px; margin-top: 10px;">أضف عميل جديد من الجانب الأيسر</p>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = clients.map(client => `
                <div class="client-item">
                    <h4>${client.first_name} ${client.last_name}</h4>
                    <div class="client-info">
                        <span><strong>📍 المكان:</strong> ${client.location}</span>
                        <span><strong>📞 الهاتف:</strong> ${client.phone}</span>
                        <span><strong>📅 التاريخ:</strong> ${new Date(client.created_at).toLocaleDateString('ar-EG')}</span>
                        ${client.gender ? `<span><strong>👤 النوع:</strong> <span class="gender-badge ${client.gender === 'ذكر' ? 'gender-male' : 'gender-female'}">${client.gender}</span></span>` : ''}
                    </div>
                    <div class="client-actions">
                        <button class="btn-small" onclick="editClient(${client.id})">تعديل ✏️</button>
                        <button class="btn-small btn-delete" onclick="deleteClient(${client.id})">حذف 🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // ✅ البحث عن عملاء
        function filterClients() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allClients.filter(client =>
                client.first_name.toLowerCase().includes(searchTerm) ||
                client.last_name.toLowerCase().includes(searchTerm) ||
                client.phone.includes(searchTerm)
            );
            displayClients(filtered);
        }

        // ✅ حذف عميل
        async function deleteClient(id) {
            if (!confirm('هل أنت متأكد من حذف هذا العميل؟')) return;

            try {
                const response = await fetch(`${API_URL}/clients/${id}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    loadClients();
                    showMessage(data.message, 'success');
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('خطأ في الاتصال بالخادم', 'error');
                console.error('Error:', error);
            }
        }

        // ✅ تحديث الإحصائيات
        async function updateStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('totalClients').textContent = data.total_clients;
                    
                    const maleCount = data.by_gender.find(g => g.gender === 'ذكر')?.count || 0;
                    const femaleCount = data.by_gender.find(g => g.gender === 'أنثى')?.count || 0;
                    
                    document.getElementById('maleCount').textContent = maleCount;
                    document.getElementById('femaleCount').textContent = femaleCount;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // ✅ دالة مساعدة لعرض الرسائل
        function showMessage(message, type) {
            const messageEl = document.getElementById('formMessage');
            messageEl.textContent = (type === 'success' ? '✅ ' : '❌ ') + message;
            messageEl.className = `message ${type}`;
            setTimeout(() => {
                messageEl.className = 'message';
            }, 5000);
        }

        // ✅ تحميل البيانات عند فتح الصفحة
        window.addEventListener('load', loadClients);

        // ✅ تحديث البيانات كل 10 ثواني
        setInterval(loadClients, 10000);

        // ملاحظة: تعديل العميل يتطلب نموذج منفصل أو popup
        function editClient(id) {
            alert('سيتم إضافة ميزة التعديل قريباً 🔧');
        }
    </script>
</body>
</html>
